<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPlatform - Диплом</title>
    <!-- Подключаем Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* Небольшой фикс, чтобы кнопка выхода смотрелась красиво в меню */
        .btn-logout {
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            padding-left: 0;
            padding-right: 0;
        }
        .btn-logout:hover {
            color: rgba(255,255,255,0.75);
        }
    </style>
</head>
<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'course-list-html' %}">🎓 EduPlatform</a>

            <!-- Кнопка "гамбургер" для мобильных телефонов -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Меню справа -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <span class="nav-link disabled text-light">Привет, {{ user.username }}</span>

                        <!-- Кнопка создания курса (только для преподавателей) -->
                        {% if user.role == 'teacher' or user.is_superuser %}
                            <a class="nav-link fw-bold text-warning" href="{% url 'course-create' %}">+ Создать курс</a>
                        {% endif %}

                        <!-- Кнопка выхода -->
                        <form method="post" action="{% url 'logout' %}" class="d-inline ms-2">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-link nav-link btn-logout">Выход</button>
                        </form>
                    {% else %}
                        <a class="nav-link active" href="{% url 'login' %}">Вход</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Подключаем Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Кнопка открытия чата (плавающая внизу справа) -->
<button class="btn btn-primary rounded-circle p-3 shadow"
        style="position: fixed; bottom: 30px; right: 30px; z-index: 1000; width: 60px; height: 60px;"
        onclick="toggleChat()">
    🤖
</button>

<!-- Окно чата (скрыто по умолчанию) -->
<div id="chat-window" class="card shadow"
     style="position: fixed; bottom: 100px; right: 30px; width: 350px; height: 500px; z-index: 1000; display: none;">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <span>AI Ассистент</span>
        <button type="button" class="btn-close btn-close-white" onclick="toggleChat()"></button>
    </div>
    <div class="card-body d-flex flex-column">
        <div id="chat-messages" class="flex-grow-1 overflow-auto mb-3" style="font-size: 0.9rem;">
            <div class="text-muted text-center small">Задайте вопрос по материалам курса...</div>
        </div>
        <div class="input-group">
            <input type="text" id="chat-input" class="form-control" placeholder="Ваш вопрос...">
            <button class="btn btn-primary" onclick="sendMessage()">→</button>
        </div>
    </div>
</div>
<script>
    function toggleChat() {
        const chat = document.getElementById('chat-window');
        chat.style.display = chat.style.display === 'none' ? 'block' : 'none';
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const messagesDiv = document.getElementById('chat-messages');
        const question = input.value.trim();

        if (!question) return;

        // Добавляем вопрос юзера
        messagesDiv.innerHTML += `<div class="mb-2 text-end"><span class="bg-light p-2 rounded d-inline-block">${question}</span></div>`;
        input.value = '';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        // Показываем индикатор загрузки
        const loadingId = 'loading-' + Date.now();
        messagesDiv.innerHTML += `<div id="${loadingId}" class="mb-2 text-start"><span class="text-muted small">Печатает...</span></div>`;

        try {
            const response = await fetch('/api/v1/chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}' // Django защита
                },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();

            // Удаляем индикатор загрузки
            document.getElementById(loadingId).remove();

            if (data.answer) {
                messagesDiv.innerHTML += `<div class="mb-2 text-start"><span class="bg-primary text-white p-2 rounded d-inline-block">${data.answer}</span></div>`;
            } else {
                messagesDiv.innerHTML += `<div class="text-danger small">Ошибка: ${data.error}</div>`;
            }

        } catch (error) {
            document.getElementById(loadingId).remove();
            messagesDiv.innerHTML += `<div class="text-danger small">Ошибка сети</div>`;
        }
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Отправка по Enter
    document.getElementById('chat-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
